<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: "Space Grotesk", system-ui, sans-serif;
        background: radial-gradient(circle at top, #051015 0, #02060b 45%, #000000 100%);
        color: #e5fef6;
        min-height: 100vh;
        padding: 30px 20px;
    }

    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
            linear-gradient(90deg, rgba(0,255,160,0.05) 1px, transparent 1px),
            linear-gradient(180deg, rgba(0,255,160,0.05) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: .35;
        pointer-events: none;
    }

    body::after {
        content: "";
        position: fixed;
        width: 500px;
        height: 500px;
        border-radius: 50%;
        top: -120px;
        right: -120px;
        background: radial-gradient(circle, rgba(0,255,160,.22), transparent 70%);
        filter: blur(90px);
        pointer-events: none;
    }

    .container {
        max-width: 1300px;
        margin: auto;
        position: relative;
        z-index: 2;
    }

    .card {
        background: rgba(11, 20, 29, 0.58);
        border: 1px solid rgba(0,255,160,.15);
        border-radius: 18px;
        padding: 30px;
        box-shadow: 0 0 40px rgba(0,0,0,.55);
        backdrop-filter: blur(10px);
    }

    h1 {
        font-size: 30px;
        color: #00ff9f;
        margin-bottom: 10px;
        letter-spacing: .02em;
    }

    p {
        color: #9bb8ae;
        margin-bottom: 22px;
        line-height: 1.6;
        font-size: 15px;
    }

    textarea {
        width: 100%;
        min-height: 150px;
        padding: 18px;
        resize: vertical;
        border-radius: 12px;
        background: #050a11;
        border: 1px solid #1b2635;
        color: #e5fef6;
        font-size: 15px;
        font-family: "Space Grotesk", system-ui, sans-serif;
        outline: none;
        transition: .2s ease;
    }

    textarea::placeholder {
        color: #6b7b8d;
    }

    textarea:focus {
        border-color: #00ff9f;
        box-shadow: 0 0 10px rgba(0,255,160,.25);
    }

    .actions {
        margin-top: 18px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    button {
        border: 1px solid rgba(0,255,160,.28);
        background: rgba(0,255,160,.08);
        color: #00ff9f;
        padding: 13px 22px;
        border-radius: 10px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .05em;
        transition: .2s ease;
        font-family: "Space Grotesk", system-ui, sans-serif;
    }

    button:hover {
        background: rgba(0,255,160,.15);
        border-color: #00ff9f;
        transform: translateY(-1px);
        box-shadow: 0 0 14px rgba(0,255,160,.18);
    }

    button:disabled {
        opacity: .6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
    }

    .actions button:last-child {
        color: #c5d9e3;
        border-color: rgba(255,255,255,.12);
        background: rgba(255,255,255,.04);
    }

    .actions button:last-child:hover {
        background: rgba(255,255,255,.08);
    }

    .status {
        margin-top: 18px;
        font-size: 14px;
        color: #7df6c2;
        padding: 12px 14px;
        border-radius: 10px;
        background: rgba(0,255,160,.05);
        border: 1px solid rgba(0,255,160,.12);
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 24px;
    }

    .result,
    .evaluation {
        background: rgba(5,10,17,.85);
        border: 1px solid rgba(0,255,160,.12);
        border-radius: 14px;
        padding: 18px;
        min-height: 290px;
        transition: .2s ease;
    }

    .result:hover,
    .evaluation:hover {
        border-color: rgba(0,255,160,.28);
        box-shadow: 0 0 18px rgba(0,255,160,.08);
    }

    .evaluation {
        min-height: 240px;
    }

    .result h2,
    .evaluation h2 {
        font-size: 19px;
        color: #e5fef6;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .meta {
        font-size: 13px;
        color: #6b7b8d;
        margin-bottom: 14px;
    }

    #grokResponse,
    #geminiResponse,
    #grokEvaluation,
    #geminiEvaluation {
        white-space: pre-wrap;
        line-height: 1.65;
        font-size: 15px;
        color: #d8fff0;
    }

    .badge {
        display: inline-flex;
        align-items: center;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
        background: rgba(0,255,160,.08);
        border: 1px solid rgba(0,255,160,.18);
        color: #7df6c2;
        text-transform: uppercase;
        letter-spacing: .06em;
    }

    .label {
        color: #00ff9f;
        font-weight: 700;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
        overflow: hidden;
        border-radius: 12px;
        background: #02060b;
        border: 1px solid rgba(0,255,160,.12);
    }

    th, td {
        padding: 12px;
        text-align: left;
        font-size: 14px;
        border-bottom: 1px solid rgba(255,255,255,.05);
    }

    th {
        background: rgba(0,255,160,.06);
        color: #7df6c2;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .04em;
        font-size: 12px;
    }

    tr:last-child td {
        border-bottom: none;
    }

    .score {
        color: #00ff9f;
        font-weight: 700;
    }

    .justification {
        margin-top: 14px;
        padding: 14px;
        border-radius: 12px;
        background: rgba(0,255,160,.03);
        border: 1px solid rgba(0,255,160,.12);
        color: #dffef2;
        line-height: 1.6;
        white-space: pre-wrap;
    }

    @media (max-width: 980px) {
        .grid {
            grid-template-columns: 1fr;
        }

        h1 {
            font-size: 26px;
        }

        .card {
            padding: 22px;
        }
    }

    @media (max-width: 600px) {
        body {
            padding: 15px;
        }

        textarea {
            min-height: 130px;
        }

        button {
            width: 100%;
        }

        .actions {
            flex-direction: column;
        }
    }
</style>
